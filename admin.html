<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO ENT — Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  background:#111;
  border:1px solid #222;
  padding:20px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#000;
  border:1px solid #333;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  background:#E50914;
  border:none;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#panel{display:none}
</style>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dlssxyetewziingcwajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs"
);

window.login = function () {
  const pass = document.getElementById("pass").value;

  if (pass === "voent123") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
};

window.uploadSong = async function () {

  const title = document.getElementById("title").value;
  const audio = document.getElementById("audio").files[0];
  const status = document.getElementById("status");

  if (!audio) {
    status.innerText = "Select a file ❌";
    return;
  }

  status.innerText = "Uploading... ⏳";

  const filePath = `songs/${Date.now()}-${audio.name}`;

  const { error: uploadError } = await supabase.storage
    .from("songs")
    .upload(filePath, audio);

  if (uploadError) {
    status.innerText = uploadError.message;
    return;
  }

  const song_url = supabase.storage
    .from("songs")
    .getPublicUrl(filePath).data.publicUrl;

  const { error: dbError } = await supabase.from("songs").insert([
    {
      title: title || audio.name,
      song_url,
      cover_url: "https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",
      created_at: new Date().toISOString()
    }
  ]);

  if (dbError) {
    status.innerText = dbError.message;
    return;
  }

  status.innerText = "Upload successful 🔥";
};
</script>
</head>

<body>

<div id="loginBox" class="box">
  <h2>VO ENT ADMIN</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" class="box">
  <h2>Upload Song</h2>

  <input id="title" placeholder="Song Title (optional)">
  <input id="audio" type="file" accept="audio/*">

  <button onclick="uploadSong()">Upload</button>

  <p id="status"></p>
</div>

</body>
</html>
