<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* CINEMATIC BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(229,9,20,.35), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(229,9,20,.15), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,.06), transparent 60%);
  animation:float 12s ease-in-out infinite alternate;
}

@keyframes float{
  from{transform:scale(1)}
  to{transform:scale(1.12)}
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px;
}

h1{
  font-size:48px;
  margin:0;
  text-shadow:0 0 25px rgba(229,9,20,.4);
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.nav a,.nav button{
  padding:10px 14px;
  background:#111;
  border:1px solid #222;
  color:#fff;
  border-radius:999px;
  cursor:pointer;
  text-decoration:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  text-align:center;
  border:1px solid #222;
}

.cover{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
.buy{
  margin-top:8px;
  background:#E50914;
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:999px;
  cursor:pointer;
  width:100%;
  font-size:12px;
}

/* MERCH */
select,input{
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  background:#0d0d0d;
  color:#fff;
}

/* PLAYER */
.playerBar{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:520px;
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>VO ENT</h1>

  <div class="nav">
    <a href="https://music.apple.com/us/artist/vito-gwuap/1504520516">Apple</a>
    <a href="https://youtube.com/@vitogwuap?si=PIHjBfMjoZlHWR4v">YouTube</a>
    <a href="https://instagram.com/officialvitogwuap">Instagram</a>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<h2 style="text-align:center">Featured Music</h2>
<div class="grid" id="songs"></div>

<h2 style="text-align:center">Merch</h2>

<div class="grid">

  <div class="card">
    <img class="cover" src="whitehoodiesmall.jpeg">
    <h3>White Hoodie</h3>
    <select><option>S</option><option>M</option><option>L</option><option>XL</option></select>
    <input type="number" value="1">
    <button class="buy" onclick="window.open('https://payhip.com/b/I6lbt','_blank')">Buy Now</button>
  </div>

  <div class="card">
    <img class="cover" src="blackhoodiesmall.jpeg">
    <h3>Black Hoodie</h3>
    <select><option>S</option><option>M</option><option>L</option><option>XL</option></select>
    <input type="number" value="1">
    <button class="buy" onclick="window.open('https://payhip.com/b/hTA0a','_blank')">Buy Now</button>
  </div>

</div>

<div class="playerBar">
  <div id="now">Not Playing</div>
  <button class="buy" onclick="togglePlay()" style="width:auto">Play/Pause</button>
</div>

<audio id="audio"></audio>

<!-- ONLY CHANGE: FIXED IMPORT -->
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://dlssxyetewziingcwajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs"
);

const audio = document.getElementById("audio");

function play(url,title){
  document.getElementById("now").innerText = title;
  audio.src = url;
  audio.currentTime = 0;
  audio.play();
  setTimeout(()=>audio.pause(),30000);
}

window.togglePlay = function(){
  if(audio.paused) audio.play();
  else audio.pause();
};

window.toggleAdmin = function(){
  const pass = prompt("Enter Admin Password:");
  if(pass==="voent123"){
    window.location.href="admin.html";
  } else {
    alert("Access denied");
  }
};

async function loadSongs(){

  const { data } = await supabase
    .from("songs")
    .select("*")
    .order("created_at",{ascending:false});

  const grid = document.getElementById("songs");
  grid.innerHTML = "";

  data.forEach(s=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <img class="cover" src="${s.cover_url}">
      <div>${s.title}</div>

      <button class="buy playBtn">Play 30s</button>
      <button class="buy" onclick="window.open('#','_blank')">Buy Full Song</button>
    `;

    c.querySelector(".playBtn").onclick=()=>play(s.song_url,s.title);

    grid.appendChild(c);
  });
}

loadSongs();

</script>

</body>
</html>
