<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 CINEMATIC BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(229,9,20,.35), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(229,9,20,.15), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,.06), transparent 60%);
  animation:float 12s ease-in-out infinite alternate;
}

@keyframes float{
  from{transform:scale(1)}
  to{transform:scale(1.12)}
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px;
}

h1{
  font-size:44px;
  margin:0;
  text-shadow:0 0 25px rgba(229,9,20,.4);
}

.nav{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:15px;
}

.nav a,.nav button{
  padding:8px 12px;
  background:#111;
  border:1px solid #222;
  color:#fff;
  border-radius:999px;
  cursor:pointer;
  text-decoration:none;
  font-size:12px;
}

/* SECTION TITLES */
h2{
  text-align:center;
  margin:25px 0 10px;
  font-size:18px;
  letter-spacing:1px;
  opacity:.9;
}

/* GRID (SMALLER + TIGHTER) */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px 20px 30px;
}

/* CARD (SMALLER SPOTIFY STYLE) */
.card{
  background:#111;
  padding:10px;
  border-radius:12px;
  text-align:center;
  border:1px solid #222;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:#E50914;
  box-shadow:0 8px 18px rgba(229,9,20,.2);
}

/* SMALLER COVER ART */
.cover{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTONS (SMALLER) */
.buy{
  margin-top:6px;
  background:#E50914;
  color:#fff;
  border:none;
  padding:7px 10px;
  border-radius:999px;
  cursor:pointer;
  width:100%;
  font-size:11px;
}

/* MERCH INPUTS (SMALLER) */
select,input{
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
  border:none;
  background:#0d0d0d;
  color:#fff;
  font-size:11px;
}

/* PLAYER (SMALLER CLEAN BAR) */
.playerBar{
  position:fixed;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  width:88%;
  max-width:520px;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>VO ENT</h1>
  <div class="sub">Music • Merch • Motion</div>

  <div class="nav">
    <a href="https://music.apple.com/us/artist/vito-gwuap/1504520516">Apple</a>
    <a href="https://youtube.com/@vitogwuap?si=PIHjBfMjoZlHWR4v">YouTube</a>
    <a href="https://instagram.com/officialvitogwuap">Instagram</a>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<!-- MUSIC -->
<h2>Featured Music</h2>
<div class="grid" id="songs"></div>

<!-- MERCH -->
<h2>Merch</h2>

<div class="grid">

  <div class="card">
    <img class="cover" src="whitehoodiesmall.jpeg">
    <h3 style="font-size:13px;margin:6px 0;">White Hoodie</h3>

    <select id="size1">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <input id="qty1" type="number" min="1" value="1">

    <button class="buy" onclick="buyMerch('https://payhip.com/b/I6lbt','size1','qty1')">
      Buy
    </button>
  </div>

  <div class="card">
    <img class="cover" src="blackhoodiesmall.jpeg">
    <h3 style="font-size:13px;margin:6px 0;">Black Hoodie</h3>

    <select id="size2">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <input id="qty2" type="number" min="1" value="1">

    <button class="buy" onclick="buyMerch('https://payhip.com/b/hTA0a','size2','qty2')">
      Buy
    </button>
  </div>

</div>

<!-- PLAYER -->
<div class="playerBar">
  <div id="now">Not Playing</div>
  <button class="buy" onclick="togglePlay()" style="width:auto;padding:5px 8px;">Play</button>
</div>

<audio id="audio"></audio>

<script>

const audio=document.getElementById("audio");

/* PLAYER */
function play(url,title){
  document.getElementById("now").innerText=title;
  audio.src=url;
  audio.currentTime=0;
  audio.play();
  setTimeout(()=>audio.pause(),30000);
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* ADMIN */
function toggleAdmin(){
  const pass=prompt("Enter Admin Password:");
  if(pass==="voent123"){
    window.location.href="admin.html";
  } else {
    alert("Access denied");
  }
}

/* SONGS */
function loadSongs(){

const songs=[
{t:"Focus",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/focus_full.mp3",p:"#"},
{t:"No Coat",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/no_coat.mp3",p:"https://payhip.com/b/FNAEB"},
{t:"Harder",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_kiing_charles-_harder.mp3",p:"https://payhip.com/b/T2rRj"},
{t:"Coupe in Slums",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_veo_dinero_kiing_charles-_coupe_in_the_slums_.mp3",p:"https://payhip.com/b/Jouvz"},
{t:"R8",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_r8.mp3",p:"#"}
];

const grid=document.getElementById("songs");

songs.forEach(s=>{
const c=document.createElement("div");
c.className="card";

c.innerHTML=`
<img class="cover" src="${s.c}">
<div style="font-size:12px;margin-top:5px;">${s.t}</div>
<button class="buy">Play</button>
<button class="buy" onclick="window.open('${s.p}','_blank')">Buy</button>
`;

c.onclick=()=>play(s.u,s.t);
grid.appendChild(c);
});
}

loadSongs();

</script>

</body>
</html>
