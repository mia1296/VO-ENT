<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 CINEMATIC BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(229,9,20,.35), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(229,9,20,.15), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,.06), transparent 60%);
  animation:float 12s ease-in-out infinite alternate;
}
@keyframes float{
  from{transform:scale(1)}
  to{transform:scale(1.12)}
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px;
}
h1{
  font-size:48px;
  margin:0;
  text-shadow:0 0 25px rgba(229,9,20,.4);
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}
.nav a,.nav button{
  padding:10px 14px;
  background:#111;
  border:1px solid #222;
  color:#fff;
  border-radius:999px;
  cursor:pointer;
  text-decoration:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  padding:16px;
  border-radius:14px;
  text-align:center;
  border:1px solid #222;
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:#E50914;
  box-shadow:0 10px 25px rgba(229,9,20,.25);
}

.cover{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.buy{
  margin-top:10px;
  background:#E50914;
  color:#fff;
  border:none;
  padding:10px 12px;
  border-radius:999px;
  cursor:pointer;
  width:100%;
}

/* MERCH INPUTS */
select,input{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  border:none;
  background:#0d0d0d;
  color:#fff;
}

/* PLAYER (CINEMATIC MINI BAR) */
.playerBar{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:650px;
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>VO ENT</h1>
  <div class="sub">Music • Merch • Motion</div>

  <div class="nav">
    <a href="https://music.apple.com/us/artist/vito-gwuap/1504520516">Apple</a>
    <a href="https://youtube.com/@vitogwuap?si=PIHjBfMjoZlHWR4v">YouTube</a>
    <a href="https://instagram.com/officialvitogwuap">Instagram</a>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<!-- FEATURED SONGS (ALWAYS VISIBLE) -->
<h2 style="text-align:center">Featured Music</h2>
<div class="grid" id="songs"></div>

<!-- ADMIN UPLOADS -->
<h2 style="text-align:center">Latest Uploads (Admin Only)</h2>
<div class="grid" id="uploads"></div>

<!-- MERCH -->
<h2 style="text-align:center">Merch</h2>

<div class="grid">

  <div class="card">
    <img class="cover" src="whitehoodiesmall.jpeg">
    <h3>White Hoodie</h3>

    <select id="size1">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <input id="qty1" type="number" min="1" value="1">

    <button class="buy" onclick="buyMerch('https://payhip.com/b/I6lbt','size1','qty1')">
      Buy Now
    </button>
  </div>

  <div class="card">
    <img class="cover" src="blackhoodiesmall.jpeg">
    <h3>Black Hoodie</h3>

    <select id="size2">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <input id="qty2" type="number" min="1" value="1">

    <button class="buy" onclick="buyMerch('https://payhip.com/b/hTA0a','size2','qty2')">
      Buy Now
    </button>
  </div>

</div>

<!-- PLAYER -->
<div class="playerBar">
  <div id="now">Not Playing</div>
  <button class="buy" onclick="togglePlay()" style="width:auto;padding:6px 10px;">Play/Pause</button>
</div>

<audio id="audio"></audio>

<script>

const audio=document.getElementById("audio");

/* 30 SECOND PLAYER */
function play(url,title){
  document.getElementById("now").innerText=title;
  audio.src=url;
  audio.currentTime=0;
  audio.play();
  setTimeout(()=>audio.pause(),30000);
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* ADMIN */
function toggleAdmin(){
  const pass=prompt("Enter Admin Password:");
  if(pass==="voent123"){
    window.location.href="admin.html";
  }
}

/* FEATURED SONGS (FIXED — NEVER DISAPPEARS) */
function loadSongs(){

const songs=[
{t:"Focus",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/focus_full.mp3"},
{t:"No Coat",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/no_coat.mp3"},
{t:"Ohhhhhh",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/veo_dinero-ohhhhhhhh.mp3"},
{t:"Harder",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_kiing_charles-_harder.mp3"},
{t:"Coupe in Slums",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_veo_dinero_kiing_charles-_coupe_in_the_slums_.mp3"},
{t:"R8",c:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/covers/logo1small.png",u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_r8.mp3"}
];

const grid=document.getElementById("songs");
grid.innerHTML="";

songs.forEach(s=>{
const c=document.createElement("div");
c.className="card";

c.innerHTML=`
<img class="cover" src="${s.c}">
<div>${s.t}</div>
<button class="buy">Play 30s</button>
`;

c.onclick=()=>play(s.u,s.t);
grid.appendChild(c);
});
}

/* SUPABASE ADMIN UPLOADS (SAFE) */
const supabase=window.supabase.createClient(
"https://dlssxyetewziingcwajz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs"
);

async function loadUploads(){
  const grid=document.getElementById("uploads");

  const {data,error}=await supabase.from("songs").select("*");

  if(error || !data || data.length===0){
    grid.innerHTML="<div style='opacity:.6'>No uploads yet</div>";
    return;
  }

  data.forEach(song=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <img class="cover" src="${song.cover_url || 'https://via.placeholder.com/140'}">
      <div>${song.title || 'Untitled'}</div>
      <button class="buy" onclick="play('${song.song_url}','${song.title}')">Play 30s</button>
    `;

    grid.appendChild(c);
  });
}

/* MERCH */
function buyMerch(url,sizeId,qtyId){
  const size=document.getElementById(sizeId).value;
  const qty=document.getElementById(qtyId).value;
  window.open(`${url}?size=${size}&qty=${qty}`,"_blank");
}

/* INIT */
loadSongs();
loadUploads();

</script>

</body>
</html>
