<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:60px 20px;
}

h1{font-size:48px;margin:0}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.nav a,.nav button{
  padding:10px 14px;
  background:#111;
  border:1px solid #222;
  color:#fff;
  border-radius:999px;
  cursor:pointer;
  text-decoration:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  padding:20px;
}

.card{
  background:#111;
  padding:16px;
  border-radius:14px;
  text-align:center;
  border:1px solid #222;
  transition:.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:#E50914;
  box-shadow:0 10px 25px rgba(229,9,20,.2);
}

.cover{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* MERCH */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#E50914;
  color:#fff;
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
}

select,input{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  border:none;
  background:#0d0d0d;
  color:#fff;
}

.buy{
  margin-top:10px;
  background:#E50914;
  color:#fff;
  border:none;
  padding:10px 12px;
  border-radius:999px;
  cursor:pointer;
  width:100%;
}

/* PLAYER */
.playerBar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0d0d0d;
  border-top:1px solid #222;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
}
</style>
</head>

<body>

<header>
  <h1>VO ENT</h1>

  <div class="nav">
    <a href="https://music.apple.com/us/artist/vito-gwuap/1504520516">Apple</a>
    <a href="https://youtube.com/@vitogwuap?si=PIHjBfMjoZlHWR4v">YouTube</a>
    <a href="https://instagram.com/officialvitogwuap">Instagram</a>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<!-- SONGS -->
<h2 style="text-align:center">Latest Drops</h2>
<div class="grid" id="songs"></div>

<h2 style="text-align:center">Classic Tracks</h2>
<div class="grid" id="old"></div>

<!-- MERCH -->
<h2 style="text-align:center;margin-top:40px;">Merch</h2>

<div class="grid">

  <div class="card">
    <div class="badge">LIMITED DROP</div>
    <img class="cover" src="whitehoodiesmall.jpeg">
    <h3>White Hoodie</h3>
    <button class="buy" onclick="window.open('https://payhip.com/b/I6lbt','_blank')">
      Buy Now
    </button>
  </div>

  <div class="card">
    <div class="badge">LIMITED DROP</div>
    <img class="cover" src="blackhoodiesmall.jpeg">
    <h3>Black Hoodie</h3>
    <button class="buy" onclick="window.open('https://payhip.com/b/hTA0a','_blank')">
      Buy Now
    </button>
  </div>

</div>

<!-- PLAYER -->
<div class="playerBar">
  <div id="now">Not Playing</div>
  <button class="buy" onclick="togglePlay()">Play/Pause</button>
</div>

<audio id="audio"></audio>

<script>

const audio=document.getElementById("audio");

/* ================= PLAYER ================= */
function play(url,title){
  document.getElementById("now").innerText=title;

  audio.src=url;
  audio.currentTime=0;
  audio.play();

  // 30 second preview lock
  setTimeout(()=>{
    audio.pause();
  },30000);
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* ================= ADMIN ================= */
function toggleAdmin(){
  const pass = prompt("Enter Admin Password:");
  if(pass === "voent123"){
    window.location.href = "admin.html";
  } else {
    alert("Access denied");
  }
}

/* ================= HARD-CODED SONGS (100% RELIABLE) ================= */
function loadSongs(){

  const songs=[
    {
      t:"Focus",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/focus_full.mp3",
      p:"#"
    },
    {
      t:"No Coat",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/no_coat.mp3",
      p:"https://payhip.com/b/FNAEB"
    },
    {
      t:"Ohhhhhh",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/veo_dinero-ohhhhhhhh.mp3",
      p:"#"
    },
    {
      t:"Harder",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_kiing_charles-_harder.mp3",
      p:"https://payhip.com/b/T2rRj"
    },
    {
      t:"Coupe in the Slums",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_veo_dinero_kiing_charles-_coupe_in_the_slums_.mp3",
      p:"https://payhip.com/b/Jouvz"
    },
    {
      t:"R8",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_r8.mp3",
      p:"#"
    }
  ];

  const grid=document.getElementById("songs");

  songs.forEach(s=>{

    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div>${s.t}</div>
      <button class="buy">Play 30s</button>
      <button class="buy" onclick="window.open('${s.p}','_blank')">Buy Full Song</button>
    `;

    c.onclick=()=>play(s.u,s.t);
    grid.appendChild(c);
  });
}

/* ================= OLD SONGS ================= */
function loadOld(){

  const old=[
    {
      t:"No Coat",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/no_coat.mp3"
    },
    {
      t:"Harder",
      u:"https://dlssxyetewziingcwajz.supabase.co/storage/v1/object/public/songs/vito_gwuap_ft_kiing_charles-_harder.mp3"
    }
  ];

  const grid=document.getElementById("old");

  old.forEach(s=>{

    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div>${s.t}</div>
      <button class="buy">Play 30s</button>
    `;

    c.onclick=()=>play(s.u,s.t);
    grid.appendChild(c);
  });
}

/* INIT */
loadSongs();
loadOld();

</script>

</body>
</html>
