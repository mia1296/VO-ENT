<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>
<meta name="description" content="VO ENT • Latest releases and merch" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#000; --card:#0c0c0c; --muted:#c6c6c6; --text:#fff;
    --accent:#E50914; --radius:16px; --shadow:0 6px 18px rgba(0,0,0,.45);
    --border:rgba(255,255,255,.08)
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter,system-ui,Arial;
    color:var(--text);
    background:#000;
  }

  a{color:inherit;text-decoration:none}
  .container{width:min(1200px,92vw);margin:auto}

  /* NAV */
  header.nav{
    position:fixed;
    inset-inline:0;
    top:0;
    z-index:60;
    background:rgba(0,0,0,.85);
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .nav-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 16px;
  }

  .brand{display:flex;gap:8px;align-items:center;font-weight:800}
  .brand img{height:24px}

  .nav-links{display:flex;gap:12px}
  .nav-links a{
    padding:8px 14px;
    border:1px solid var(--border);
    border-radius:999px;
    font-size:14px;
  }

  .cta{
    background:var(--accent);
    border:none !important;
    font-weight:700;
  }

  /* HERO */
  .hero{
    padding:130px 16px 50px;
    text-align:center;
  }

  .hero-logo{width:120px;margin:auto;display:block}
  .hero h1{font-size:40px;margin:10px 0}
  .sub{color:var(--muted)}

  /* GRID */
  .grid{
    display:grid;
    gap:16px;
  }

  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)}

  @media(max-width:900px){
    .grid.cols-3{grid-template-columns:repeat(2,1fr)}
  }

  @media(max-width:600px){
    .grid.cols-3,.grid.cols-2{grid-template-columns:1fr}
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    text-align:center;
  }

  audio{width:100%}

  /* LOGIN OVERLAY */
  #loginBox{
    display:none; /* IMPORTANT FIX */
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
  }

  #loginBox div{
    background:#111;
    padding:20px;
    border:1px solid #222;
    width:300px;
    text-align:center;
    border-radius:12px;
  }

  #loginBox input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#000;
    border:1px solid #333;
    color:#fff;
  }

  /* ADMIN PANEL */
  #adminPanel{
    display:none;
    position:fixed;
    right:20px;
    bottom:100px;
    background:#111;
    border:1px solid #222;
    padding:15px;
    width:260px;
    z-index:9998;
    border-radius:12px;
  }

  #adminPanel input{
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#000;
    border:1px solid #333;
    color:#fff;
  }
</style>
</head>

<body>

<!-- 🔐 LOGIN POPUP -->
<div id="loginBox">
  <div>
    <h3>VO ENT Admin</h3>
    <input id="pass" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<!-- NAV -->
<header class="nav">
  <div class="nav-inner container">
    <div class="brand">
      <img src="logo1small.png">
      <span>VO ENT</span>
    </div>

    <nav class="nav-links">
      <a href="#songs">Music</a>
      <a href="#merch">Merch</a>
      <a class="cta" href="signup.html">Join Now</a>

      <!-- ✅ ADMIN BUTTON -->
      <a class="cta" href="javascript:void(0)" onclick="openAdmin()">Admin</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <img class="hero-logo" src="logo3small.png">
  <h1>WELCOME TO VO ENT</h1>
  <div class="sub">Music • Merch • Community</div>
</section>

<!-- SONGS (UNCHANGED) -->
<section class="container" id="songs">
<h2 style="text-align:center">YOUR SONGS</h2>

<div class="grid cols-3">

  <div class="card">
    <div>No Coat</div>
    <audio controls><source src="no_coat.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>Coupe in the Slums</div>
    <audio controls><source src="vito_gwuap_ft_veo_dinero_kiing_charles-_coupe_in_the_slums_.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>Harder</div>
    <audio controls><source src="vito_gwuap_ft_kiing_charles-_harder.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>Ohhhhhh</div>
    <audio controls><source src="veo_dinero-ohhhhhhhh.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>Body</div>
    <audio controls><source src="focus_full.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>Boss Up</div>
    <audio controls><source src="boss_up.mp3?v=4"></audio>
  </div>

  <div class="card">
    <div>R8</div>
    <audio controls><source src="vito_r8.mp3?v=4"></audio>
  </div>

</div>
</section>

<!-- MERCH -->
<section class="container" id="merch">
<h2 style="text-align:center">MERCH</h2>

<div class="grid cols-2">
  <div class="card"><img src="whitehoodiesmall.jpeg" width="150"><br><a href="#">Buy</a></div>
  <div class="card"><img src="blackhoodiesmall.jpeg" width="150"><br><a href="#">Buy</a></div>
</div>
</section>

<!-- 🔒 ADMIN PANEL -->
<div id="adminPanel">
  <h4>UPLOAD</h4>
  <input placeholder="Title">
  <input type="file">
  <input type="file">
  <button>Upload</button>
</div>

<script>
const ADMIN_PASS = "voent123";

/* ✅ OPEN LOGIN ONLY WHEN BUTTON CLICKED */
function openAdmin(){
  document.getElementById("loginBox").style.display="flex";
}

/* LOGIN CHECK */
function login(){
  const val = document.getElementById("pass").value;

  if(val === ADMIN_PASS){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  } else {
    document.getElementById("msg").innerText="Wrong password";
  }
}
</script>

</body>
</html>
