<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VO ENT — Music & Merch</title>
<meta name="description" content="VO ENT • Latest releases and merch" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#000; --card:#0c0c0c; --muted:#c6c6c6; --text:#fff;
    --accent:#E50914; --radius:16px; --shadow:0 6px 18px rgba(0,0,0,.45);
    --border:rgba(255,255,255,.08)
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
    color:var(--text);background:#000;overflow-x:hidden;
    background:
      radial-gradient(1400px 600px at 50% -5%, rgba(229,9,20,.22), transparent 60%),
      #000;
  }
  a{color:inherit;text-decoration:none}
  .container{width:min(1200px,92vw);margin-inline:auto}

  header.nav{position:fixed; inset-inline:0; top:0; z-index:60;
    backdrop-filter:saturate(140%) blur(10px);
    background:rgba(0,0,0,.8);
    border-bottom:1px solid rgba(255,255,255,.06)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800}
  .brand img{height:24px}
  .nav-links{display:flex;gap:12px}
  .nav-links a{padding:8px 14px;border-radius:999px;border:1px solid var(--border);font-size:14px}
  .nav-links a.cta{background:var(--accent);border-color:transparent;font-weight:700}

  .hero{padding:128px 16px 56px;text-align:center}
  .hero .hero-logo{width:min(120px,28vw);margin:0 auto 16px}
  .hero h1{font-size:clamp(28px,5vw,52px)}
  .sub{color:var(--muted);margin-bottom:22px}

  .row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-block;background:#111;border:1px solid var(--border);
    padding:12px 22px;border-radius:999px;font-weight:700}
  .btn-primary{background:var(--accent);border:none}

  section{padding:44px 0}
  .section-title{text-align:center}

  .grid{display:grid;gap:16px}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.grid.cols-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:620px){.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);text-align:center;padding:16px}

  .media{aspect-ratio:1/1;display:grid;place-items:center}
  .media img{width:60%}

  audio{width:100%;max-width:260px}

  /* 🔐 LOGIN OVERLAY */
  #loginBox{
    position:fixed;inset:0;
    background:rgba(0,0,0,.95);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
  }
  #loginBox div{
    background:#111;padding:20px;border:1px solid #222;
    width:300px;text-align:center;border-radius:12px;
  }

  /* 🔒 ADMIN PANEL (HIDDEN) */
  #adminPanel{
    display:none;
    position:fixed;
    right:20px;
    bottom:100px;
    background:#111;
    border:1px solid #222;
    padding:15px;
    width:260px;
    z-index:9998;
    border-radius:12px;
  }
  #adminPanel input{
    width:100%;margin:5px 0;padding:8px;background:#000;
    border:1px solid #333;color:#fff;
  }
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">

</div>

<header class="nav">

  <input type="file">

<!-- LOGIN SCRIPT -->
<script>
const ADMIN_PASS = "voent123";

function login(){
  const val = document.getElementById("pass").value;
  if(val === ADMIN_PASS){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  } else {
    document.getElementById("msg").innerText="Wrong password";
  }
}
</script>

</body>
</html>
