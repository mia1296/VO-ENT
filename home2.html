<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO ENT Music</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

header {
  text-align:center;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.section {
  margin:40px 0;
}

/* Upload box */
.upload-box {
  border:1px solid #222;
  padding:20px;
  border-radius:10px;
  background:#0a0a0a;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#111;
  border:1px solid #222;
  color:#fff;
}

button {
  width:100%;
  padding:12px;
  background:#E50914;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

.music-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:15px;
  border:1px solid #222;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:8px;
}

audio {
  width:100%;
  margin-top:10px;
}

.buy {
  display:block;
  margin-top:10px;
  padding:10px;
  background:#E50914;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>VO ENT Music</h1>
  <p>Upload • Stream • Shop</p>
</header>

<div class="container">

<!-- 🎵 MUSIC DISPLAY -->
<div class="section">
  <h2>Latest Music</h2>
  <div class="music-grid" id="musicList"></div>
</div>

<!-- 🔼 UPLOAD SECTION (ADMIN) -->
<div class="section upload-box">
  <h2>Upload New Song</h2>

  <input id="title" placeholder="Song Title">
  <input type="file" id="cover" accept="image/*">
  <input type="file" id="song" accept="audio/*">

  <button onclick="uploadSong()">Upload Song</button>

  <p id="status"></p>
</div>

</div>

<!-- ⚙️ SUPABASE SCRIPT -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// 🔑 REPLACE THESE
const supabaseUrl = "dlssxyetewziingcwajz.";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs”;

const supabase = createClient (dlssxyetewziingcwajz, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs);

// 🚀 UPLOAD SONG
window.uploadSong = async function () {
  const title = document.getElementById("title").value;
  const cover = document.getElementById("cover").files[0];
  const song = document.getElementById("song").files[0];
  const status = document.getElementById("status");

  if (!title || !cover || !song) {
    status.innerText = "Fill all fields";
    return;
  }

  status.innerText = "Uploading...";

  try {
    const coverPath = `covers/${Date.now()}-${cover.name}`;
    const songPath = `songs/${Date.now()}-${song.name}`;

    await supabase.storage.from("covers").upload(coverPath, cover);
    await supabase.storage.from("songs").upload(songPath, song);

    const coverUrl = supabase.storage.from("covers").getPublicUrl(coverPath).data.publicUrl;
    const songUrl = supabase.storage.from("songs").getPublicUrl(songPath).data.publicUrl;

    await supabase.from("songs").insert([
      {
        title,
        cover_url: coverUrl,
        song_url: songUrl,
        created_at: new Date()
      }
    ]);

    status.innerText = "Upload successful 🔥";

    loadSongs();

  } catch (err) {
    status.innerText = "Error: " + err.message;
  }
};

// 🎧 LOAD SONGS
async function loadSongs() {
  const musicList = document.getElementById("musicList");
  musicList.innerHTML = "";

  const { data } = await supabase.from("songs").select("*");

  data.forEach(song => {
    musicList.innerHTML += `
      <div class="card">
        <img src="${song.cover_url}">
        <h3>${song.title}</h3>
        <audio controls src="${song.song_url}"></audio>
        <a class="buy" href="#">Buy Now</a>
      </div>
    `;
  });
}

loadSongs();
</script>

</body>
</html>
