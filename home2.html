<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO ENT</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}

header {
  text-align:center;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.section {
  margin:40px 0;
}

.merch-item {
  margin:20px 0;
  text-align:center;
}

button {
  background:#E50914;
  color:#fff;
  border:none;
  padding:10px 20px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* MUSIC GRID */
.music-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:8px;
}

.upload-box {
  background:#0a0a0a;
  border:1px solid #222;
  padding:20px;
  margin-top:40px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#111;
  border:1px solid #222;
  color:#fff;
}

/* 🎧 GLOBAL PLAYER */
#playerBar {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  border-top:1px solid #222;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
}

#playerBar img {
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <h1>VO ENT</h1>
  <p>Music • Merch • Brand</p>
</header>

<div class="container">

<!-- MUSIC -->
<div class="section">
  <h2>Music</h2>
  <div id="musicList" class="music-grid"></div>
</div>

<!-- MERCH -->
<div class="section">
  <h2>Merch</h2>

  <div class="merch-item">
    <img src="whitehoodiesmall.jpeg" width="200">
    <br>
    <button>Buy Now</button>
  </div>

  <div class="merch-item">
    <img src="blackhoodiesmall.jpeg" width="200">
    <br>
    <button>Buy Now</button>
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About VO ENT</h2>
  <p>Your brand, your sound, your movement.</p>
</div>

<!-- UPLOAD -->
<div class="upload-box">
  <h2>Upload Song (Admin)</h2>

  <input id="title" placeholder="Song Title">
  <input type="file" id="cover" accept="image/*">
  <input type="file" id="song" accept="audio/*">

  <button onclick="uploadSong()">Upload Song</button>

  <p id="status"></p>
</div>

</div>

<!-- 🎧 GLOBAL PLAYER -->
<div id="playerBar">
  <img id="playerCover">
  <div style="flex:1;">
    <div id="playerTitle">No song playing</div>
    <audio id="audioPlayer" controls style="width:100%;"></audio>
  </div>
</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://dlssxyetewziingcwajz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsc3N4eWV0ZXd6aWluZ2N3YWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDkwNDksImV4cCI6MjA5MjgyNTA0OX0.obaAo-n8-OTAWXFr6motzeOSLDqEHbqV6x6TL8b1wMs";

const supabase = createClient(supabaseUrl, supabaseKey);

/* 🚀 UPLOAD */
window.uploadSong = async function () {
  const title = document.getElementById("title").value;
  const cover = document.getElementById("cover").files[0];
  const song = document.getElementById("song").files[0];
  const status = document.getElementById("status");

  if (!title || !cover || !song) {
    status.innerText = "Please fill all fields";
    return;
  }

  status.innerText = "Uploading...";

  const coverPath = `covers/${Date.now()}-${cover.name}`;
  const songPath = `songs/${Date.now()}-${song.name}`;

  await supabase.storage.from("covers").upload(coverPath, cover);
  await supabase.storage.from("songs").upload(songPath, song);

  const coverUrl = supabase.storage.from("covers").getPublicUrl(coverPath).data.publicUrl;
  const songUrl = supabase.storage.from("songs").getPublicUrl(songPath).data.publicUrl;

  await supabase.from("songs").insert([
    {
      title,
      cover_url: coverUrl,
      song_url: songUrl,
      created_at: new Date()
    }
  ]);

  status.innerText = "Upload successful 🔥";
  loadSongs();
};

/* 🎧 STREAMING LOAD */
async function loadSongs() {
  const musicList = document.getElementById("musicList");

  const { data } = await supabase.from("songs").select("*");

  musicList.innerHTML = "";

  data.forEach(song => {
    musicList.innerHTML += `
      <div class="card" onclick="playSong('${song.song_url}','${song.cover_url}','${song.title}')">
        <img src="${song.cover_url}">
        <h3>${song.title}</h3>
        <button>Play</button>
      </div>
    `;
  });
}

/* ▶️ PLAYER */
window.playSong = function(url, cover, title) {
  document.getElementById("audioPlayer").src = url;
  document.getElementById("playerCover").src = cover;
  document.getElementById("playerTitle").innerText = title;

  document.getElementById("audioPlayer").play();
};

loadSongs();
</script>

</body>
</html>
