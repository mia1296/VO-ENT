<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO ENT — Welcome</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* glow background */
.bg-glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(229,9,20,.25), transparent 60%);
  animation:float 6s ease-in-out infinite;
  filter:blur(40px);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-30px)}
}

/* content */
.box{
  text-align:center;
  z-index:2;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1{
  font-size:42px;
  margin:0;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(229,9,20,.4);
}

p{
  color:#bbb;
  margin-top:10px;
  margin-bottom:25px;
}

/* buttons */
.btn{
  display:block;
  width:220px;
  margin:10px auto;
  padding:14px 26px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
  transition:all .3s ease;
}

.enter{
  background:#E50914;
  color:#fff;
  box-shadow:0 0 15px rgba(229,9,20,.25);
}

.signup{
  background:#111;
  color:#fff;
  border:1px solid #333;
}

.btn:hover{
  transform:scale(1.05);
}

/* fade-out */
.fade-out{
  animation:fadeOut .6s ease forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(1.05);
  }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="box" id="content">
  <h1>VO ENT</h1>
  <p>Enter the movement</p>

  <!-- ENTER -->
  <a class="btn enter" href="./home.html" onclick="go(event, './home.html')">Enter Site</a>

  <!-- SIGN UP -->
  <a class="btn signup" href="signup.html" onclick="go(event, 'signup.html')">Sign Up</a>
</div>

<script>
function go(e, url){
  e.preventDefault();

  const box = document.getElementById("content");
  box.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = url;
  }, 600);
}
</script>

</body>
</html>
